<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassy-Hiring-Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="card-content">
            <div class="visual-area">
                <div class="particle p1"></div>
                <div class="particle p2"></div>
                <div class="particle p3"></div>
                <div class="dashed-line line-left"></div>
                <div class="dashed-line line-right"></div>
                <div class="dashed-line line-connector"></div>
                <div class="icon-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                        <path d="M3 3v18h18" stroke-width="2"></path>
                    </svg>
                </div>
                <div class="cubes-wrapper">
                    <div class="cube cube-1">
                        <div class="cube-face top"></div>
                        <div class="cube-face front"></div>
                        <div class="cube-face right"></div>
                    </div>
                    <div class="cube cube-2">
                        <div class="cube-face top"></div>
                        <div class="cube-face front"></div>
                        <div class="cube-face right"></div>
                    </div>
                    <div class="cube cube-3">
                        <div class="cube-face top"></div>
                        <div class="cube-face front"></div>
                        <div class="cube-face right"></div>
                    </div>
                    <div class="cube cube-4">
                        <div class="cube-face top"></div>
                        <div class="cube-face front"></div>
                        <div class="cube-face right"></div>
                    </div>
                    <div class="cube cube-5">
                        <div class="cube-face top"></div>
                        <div class="cube-face front"></div>
                        <div class="cube-face right"></div>
                    </div>
                </div>
            </div>
            <div class="text-content">
                <div class="title">Smart hiring starts with one link</div>
                <p class="subtitle">Share a link — receive voice
                    answers, instantly scored.</p>
            </div>
        </div>
    </div>

</body>

</html>
